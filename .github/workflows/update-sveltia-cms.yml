name: Update Sveltia CMS

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve versions
        id: versions
        run: |
          RELEASE=$(curl -sf https://api.github.com/repos/sveltia/sveltia-cms/releases/latest)
          LATEST=$(echo "$RELEASE" | jq -r '.tag_name | ltrimstr("v")')
          PUBLISHED_AT=$(echo "$RELEASE" | jq -r '.published_at')
          AGE_DAYS=$(( ( $(date -u +%s) - $(date -u -d "$PUBLISHED_AT" +%s) ) / 86400 ))
          CURRENT=$(grep -oP '(?<=@sveltia/cms@)[\d.]+' admin/index.html)
          if [[ ! "$LATEST" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$ ]]; then
            echo "Refusing: unexpected upstream version format '$LATEST'" >&2
            exit 1
          fi
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          if [[ "$LATEST" == "$CURRENT" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: already on $LATEST"
          elif [[ $AGE_DAYS -lt 3 ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping: v$LATEST released ${AGE_DAYS}d ago (cooldown: 3d)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing open PR
        if: steps.versions.outputs.skip == 'false'
        id: pr_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh pr list --search "sveltia-cms in:title" --state open --json number --jq 'length')
          echo "open=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Compute SRI hash
        if: steps.versions.outputs.skip == 'false' && steps.pr_check.outputs.open == '0'
        id: sri
        env:
          VERSION: ${{ steps.versions.outputs.latest }}
        run: |
          HASH=$(curl -sL "https://registry.npmjs.org/@sveltia/cms/-/cms-${VERSION}.tgz" \
            | tar -xzO 'package/dist/sveltia-cms.js' \
            | openssl dgst -sha384 -binary | base64 -w0)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Patch admin/index.html
        if: steps.versions.outputs.skip == 'false' && steps.pr_check.outputs.open == '0'
        env:
          VERSION: ${{ steps.versions.outputs.latest }}
          HASH: ${{ steps.sri.outputs.hash }}
        run: |
          sed -i \
            -e "s|@sveltia/cms@[0-9.]*|@sveltia/cms@${VERSION}|" \
            -e "s|integrity=\"sha384-[^\"]*\"|integrity=\"sha384-${HASH}\"|" \
            admin/index.html

      - name: Open PR
        if: steps.versions.outputs.skip == 'false' && steps.pr_check.outputs.open == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.versions.outputs.latest }}
          CURRENT: ${{ steps.versions.outputs.current }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="sveltia-cms-${VERSION}"
          git checkout -b "$BRANCH"
          git add admin/index.html
          git commit -m "chore: bump Sveltia CMS to v${VERSION}"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: bump Sveltia CMS to v${VERSION}" \
            --body "Bumps Sveltia CMS from v${CURRENT} to v${VERSION} and refreshes SRI hash.

          [Release notes](https://github.com/sveltia/sveltia-cms/releases/tag/v${VERSION})"
