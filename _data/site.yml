meetup:
  location: Dick's Primal Burger
  address: 4905 SE Woodstock Blvd, Portland, OR 97206
  time: 4:00 PM
  day: First Saturday of every month
  notes: ​Grab a burger and join fellow Libertarians as we work to spread liberty through the Portland area! If you believe that no one knows how to run your life better than you, then you might be a Libertarian! At our meetings, we socialize, plan outreach, write ballot arguments, listen to guest speakers, and more. Look forward to seeing you there! All peaceful people are welcome. You don't need to be a Multnomah County resident or registered Libertarian to join meetings.
