backend:
  name: github
  repo: LPOregon/lpmultco
  branch: main
  # When transferring to the org, change repo to: their-org/lpmc
  # and update the OAuth app callback URL in GitHub org settings

media_folder: "assets/images"
public_folder: "/assets/images"

collections:

  # News posts — create/edit via the CMS UI
  - name: "posts"
    label: "News & Announcements"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Body", name: "body", widget: "markdown"}

  # Site settings — officers, meetup info, resources
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Officers, Meetup & Resources"
        file: "_data/site.yml"
        fields:
          - label: "Officers"
            name: "officers"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role", name: "role", widget: "string"}
          - label: "Meetup Details"
            name: "meetup"
            widget: "object"
            fields:
              - {label: "Location Name", name: "location", widget: "string"}
              - {label: "Address", name: "address", widget: "string"}
              - {label: "Time", name: "time", widget: "string"}
              - {label: "Schedule", name: "day", widget: "string"}
              - {label: "Welcome Note", name: "notes", widget: "text"}
              - label: "Luma Event ID"
                name: luma_event_id
                widget: string
                required: false
                hint: "Slug from your lu.ma event URL — e.g. 'abc123' from lu.ma/abc123. Leave blank to hide the RSVP button."
              - label: "Next Event Date"
                name: luma_next_date
                widget: string
                required: false
                hint: "Display date for the next event card, e.g. 'April 5, 2026'. Update monthly alongside the event ID."
              - label: "Luma Calendar ID"
                name: luma_calendar_id
                widget: string
                required: false
                hint: "From Luma dashboard → Calendar → Share/Embed. Format: cal-xxxxxxxx. Leave blank to hide the calendar."
          - label: "Resources"
            name: "resources"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
              - {label: "Description", name: "description", widget: "string"}
