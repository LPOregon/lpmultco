<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://gc.zgo.at https://embed.lu.ma https://*.lu.ma; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.lu.ma; font-src 'self' https://fonts.gstatic.com https://*.lu.ma; img-src 'self' data: https://lpmultco.goatcounter.com https://*.lu.ma; connect-src 'self' https://lpmultco.goatcounter.com https://*.lu.ma; frame-src https://*.lu.ma; base-uri 'self'; form-action 'self' https://secure.anedot.com https://docs.google.com; object-src 'none'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>{% if page.title %}{{ page.title | escape }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }} — {% endif %}{{ site.title }}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{{ '/assets/images/portland-skyline.jpg' | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Roboto+Slab:wght@300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  {% if page.url == '/' %}<link rel="preload" as="image" href="{{ '/assets/images/portland-skyline.jpg' | relative_url }}" fetchpriority="high">{% endif %}
  <script data-goatcounter="https://lpmultco.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</head>
<body>
  {% include nav.html %}
  <main>{{ content }}</main>
  {% include footer.html %}
  <script id="luma-checkout" src="https://embed.lu.ma/checkout-button.js"></script>
  <script src="{{ '/assets/js/nav.js' | relative_url }}" defer></script>
</body>
</html>
