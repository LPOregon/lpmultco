---
layout: default
title: News
---
<div class="news-archive-hero">
  <div class="eyebrow">Multnomah Libertarians</div>
  <div class="sec-title sec-title-light">News &amp; Announcements</div>
</div>
<div class="news-archive-list">
  <div class="news-archive-inner">
    {% for post in site.posts %}
    <a href="{{ post.url | relative_url }}" class="news-archive-link">
      <div class="news-card">
        <div class="news-date">{{ post.date | date: "%b %-d, %Y" }}</div>
        <div class="news-body">
          <div class="news-title">{{ post.title }}</div>
          {% if post.excerpt %}
          <div class="news-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</div>
          {% endif %}
        </div>
        <div class="news-arrow">→</div>
      </div>
    </a>
    {% else %}
    <p class="news-empty">No posts yet.</p>
    {% endfor %}
  </div>
</div>
